services:
  shellyadmin:
    image: ${SHELLYADMIN_IMAGE:-ghcr.io/buliwyf42/shellyadmin:latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        VERSION: ${SHELLYADMIN_VERSION:-dev}
        VCS_REF: ${GIT_COMMIT:-unknown}
    ports:
      - "8080:8080"
    volumes:
      - shellyadmin-data:/data
    environment:
      DATA_DIR: /data
      # argon2id PHC string generated with
      #   docker run --rm ghcr.io/buliwyf42/shellyadmin:latest hash-password <plaintext>
      # Stored in the secrets/shellyadmin_pass.txt file mounted via the shellyadmin_pass secret below.
      SHELLYADMIN_PASS_HASH_FILE: /run/secrets/shellyadmin_pass
      SHELLYADMIN_SECRET_FILE: /run/secrets/shellyadmin_secret
      # REQUIRED since v0.3.0 (ADR-0013): base64 of a 32-byte key for at-rest
      # credential encryption. The binary refuses to start without it. Keep it
      # stable across recreates — losing or rotating it orphans stored
      # credentials. Generate: `openssl rand -base64 32 > secrets/shellyadmin_encryption_key.txt`
      SHELLYADMIN_ENCRYPTION_KEY_FILE: /run/secrets/shellyadmin_encryption_key
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
    secrets:
      - shellyadmin_pass
      - shellyadmin_secret
      - shellyadmin_encryption_key
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # S14 — these caps are needed for the default root+su-exec startup
    # path: CHOWN to fix /data permissions on first volume attach,
    # SETGID/SETUID to drop privileges via su-exec, DAC_OVERRIDE to read
    # root-owned /run/secrets files. Operators who pre-chown the host
    # path and add `user: "<shelly-uid>"` below can drop CHOWN +
    # SETGID + SETUID entirely (entrypoint detects non-root and skips
    # the privileged steps). DAC_OVERRIDE always required if reading
    # Docker-managed secrets.
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    pids_limit: 256
    init: true
    stop_grace_period: 15s
    restart: unless-stopped

volumes:
  shellyadmin-data:

secrets:
  shellyadmin_pass:
    file: ../secrets/shellyadmin_pass.txt
  shellyadmin_secret:
    file: ../secrets/shellyadmin_secret.txt
  shellyadmin_encryption_key:
    file: ../secrets/shellyadmin_encryption_key.txt
