run:
  go: "1.24"
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gofmt
    - goimports
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unconvert
    - unused

linters-settings:
  errcheck:
    check-type-assertions: false
    check-blank: false
  goimports:
    local-prefixes: shellyadmin

issues:
  exclude-rules:
    # Tests routinely ignore errors from fixture/teardown calls where the
    # failure mode is obvious from the surrounding assertions. Keeping
    # errcheck on non-test code still covers the interesting cases.
    - path: _test\.go
      linters:
        - errcheck
  max-issues-per-linter: 0
  max-same-issues: 0
