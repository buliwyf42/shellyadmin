services:
  shellyadmin:
    image: ghcr.io/buliwyf42/shellyadmin:v0.1.19
    container_name: shellyadmin
    ports:
      - "8080:8080"
      # Uncomment to expose the read-only MCP listener (only binds when
      # SHELLYADMIN_MCP_TOKEN is set on the environment block below).
      # - "8081:8081"
    volumes:
      - /docker/shellyadmin:/data
    environment:
      DATA_DIR: /data
      SHELLYADMIN_USER: ${SHELLYADMIN_USER:-admin}
      # Optional (ADR-0017). Leave unset to create the admin account via the
      # first-run setup screen in the web UI. If set on a fresh instance the
      # hash is imported into the DB once at boot, then ignored. Generate with:
      #   docker run --rm ghcr.io/buliwyf42/shellyadmin:latest hash-password <plaintext>
      SHELLYADMIN_PASS_HASH: ${SHELLYADMIN_PASS_HASH:-}
      SHELLYADMIN_SECRET: ${SHELLYADMIN_SECRET:-change-this-cookie-secret}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      # Set to enable the read-only MCP listener. Clients send
      # `Authorization: Bearer <this value>`. Leave unset to keep MCP off.
      # SHELLYADMIN_MCP_TOKEN: ${SHELLYADMIN_MCP_TOKEN:-}
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    pids_limit: 256
    init: true
    stop_grace_period: 15s
    restart: unless-stopped
