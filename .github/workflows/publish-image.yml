name: Publish Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/shellyadmin

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: write # required so the release-creation step at the end can post a Release
      packages: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=ShellyAdmin
            org.opencontainers.image.description=Self-hosted Shelly fleet management for trusted local networks
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
          build-args: |
            VERSION=${{ github.ref_name }}
            VCS_REF=${{ github.sha }}

      # S3 — cosign keyless signing of the multi-arch image index.
      # Verification (operator-side, see DEPLOYMENT.md):
      #   cosign verify \
      #     --certificate-identity-regexp 'https://github.com/buliwyf42/shellyadmin/' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      #     ghcr.io/buliwyf42/shellyadmin:vX.Y.Z
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v2.4.1'

      - name: Sign published images (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          # build-push-action's `tags` is a multi-line list; cosign signs each
          # tag at the same digest so any tag the operator pulls resolves to
          # the same signed manifest.
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            cosign sign --yes "${tag}@${DIGEST}"
          done <<< "$TAGS"

      # S4 — Trivy scans the published image for HIGH/CRITICAL vulns.
      # Runs against the digest (not tag) so a tag-pivot between push and
      # scan cannot mask a known-vulnerable layer. Exit code 1 fails the
      # workflow but the release has already been pushed — the operator
      # gets a notification and decides whether to roll the tag back.
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'

      - name: Extract release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/v')
        id: notes
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"           # e.g. v0.1.6
          version="${tag#v}"                  # e.g. 0.1.6
          # Pull lines between "## [<version>]" and the next "## [" header,
          # then strip the bracketing header line and trailing blank line so
          # the body matches what we hand-write into GitHub Releases.
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { capture = 1; next }
            capture && /^## \[/    { exit }
            capture                { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "no CHANGELOG entry found for $tag, falling back to commit subject" >&2
            git log -1 --pretty=%B "$tag" > /tmp/release-notes.md
          fi
          {
            echo "version=$version"
            echo "notes-file=/tmp/release-notes.md"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${{ steps.notes.outputs.version }}"
          # CHANGELOG headers may carry an optional em-dash subtitle:
          #   ## [0.1.8] - 2026-05-07 — Quick summary of the release
          # When present, use it as the release title suffix. Falls back to
          # bare "v<version>" when the header has no subtitle.
          header="$(awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { print; exit }
          ' CHANGELOG.md)"
          subtitle="$(printf '%s' "$header" | sed -nE 's/^## \[[^]]+\] - [0-9-]+ +— +(.+)$/\1/p')"
          if [ -n "$subtitle" ]; then
            title="v${version} — ${subtitle}"
          else
            title="v${version}"
          fi
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$title" --notes-file /tmp/release-notes.md
          else
            extra=()
            # Mark v0.x.y as the latest release; pre-releases (v*-rc*, v*-beta*) opt out.
            case "$tag" in
              *-rc*|*-beta*|*-alpha*) extra+=(--prerelease) ;;
              *)                       extra+=(--latest) ;;
            esac
            gh release create "$tag" "${extra[@]}" --title "$title" --notes-file /tmp/release-notes.md
          fi
