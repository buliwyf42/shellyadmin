name: Dependabot auto-merge

# Enables GitHub auto-merge on Dependabot PRs for patch + minor bumps.
# The merge only fires once required status checks (Test workflow) pass,
# so this never bypasses CI. Major bumps are left for manual review.
#
# Prerequisites in repo Settings:
#   - "Allow auto-merge" enabled (Settings → General → Pull Requests)
#   - A branch protection rule on `main` requiring the Test workflow,
#     otherwise `gh pr merge --auto` errors with "Branch is not protected".

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch + minor
        if: steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
