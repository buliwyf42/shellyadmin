name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # S20 — guard the three places we bump on every release. The release
  # checklist in CLAUDE.md / SECURITY.md requires VERSION, web/package.json,
  # and web/package-lock.json to move together. CI failing here catches a
  # half-bumped commit before the publish-image workflow tags an image
  # whose binary advertises one version and whose frontend reports another.
  version-sync:
    name: Release-file version sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Compare VERSION, web/package.json, web/package-lock.json
        run: |
          set -euo pipefail
          v_file=$(tr -d '\n\r ' < VERSION)
          v_pkg=$(node -p "require('./web/package.json').version")
          v_lock=$(node -p "require('./web/package-lock.json').version")
          echo "VERSION=$v_file"
          echo "package.json=$v_pkg"
          echo "package-lock.json=$v_lock"
          if [ "$v_file" != "$v_pkg" ] || [ "$v_file" != "$v_lock" ]; then
            echo "::error::version drift — VERSION/package.json/package-lock.json must all match"
            exit 1
          fi

  backend:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.25'
          cache: true

      - name: go vet
        run: go vet ./...

      # -coverpkg=./... counts cross-package coverage so the M7
      # services-split tests in internal/services/*_test.go register
      # against the sub-packages they exercise (jobs/, credentials/,
      # backup/, etc.) instead of leaving each sub-package at 0%
      # package-local coverage. Without this flag the same code looks
      # ~12 points less covered than it actually is.
      - name: Run tests with coverage
        run: go test ./... -coverpkg=./... -coverprofile=coverage.out -covermode=atomic

      # M3 — drift check between `internal/models.*` and the canonical
      # snapshot in `internal/models/schema.gen.json`. A new field on a
      # struct that the SPA serialises has to be regenerated with
      # `go run ./cmd/modelschema` and committed alongside the matching
      # `web/src/lib/types.ts` update. Non-zero exit on drift.
      - name: Model schema drift check
        run: go run ./cmd/modelschema --check

      # S15 — coverage gate. Baseline at the v0.2.10 cut was 41.6%
      # measured with the default package-local coverage; v0.3.0
      # switched to -coverpkg=./... (see Run tests step) which gives
      # a more honest cross-package count and durably reads ~50%.
      # 45% gate guards against regression. Bump this floor when the
      # measured number durably exceeds it. Note: models/, util/,
      # and cmd/ have no tests by design (data structs / entry).
      - name: Coverage gate (>=45%)
        run: |
          set -euo pipefail
          go tool cover -func=coverage.out | grep total: | awk '{print $3}' > coverage.txt
          pct=$(sed 's/%//' coverage.txt)
          echo "coverage: ${pct}%"
          ok=$(awk -v p="$pct" 'BEGIN{print (p >= 45.0) ? 1 : 0}')
          if [ "$ok" -ne 1 ]; then
            echo "::error::coverage ${pct}% < 45% floor"
            exit 1
          fi

  govulncheck:
    name: Go vulnerability check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.25'
          cache: true

      # govulncheck is informational while Go releases catch up on stdlib
      # CVEs — a fresh `net`/`net/http` advisory will flag any deployment
      # still on the previous patch release, but blocking CI on it would
      # turn every Go security release into an unrelated test failure
      # for every PR until setup-go's "1.25" alias points to the new
      # patch. The output is still surfaced in the job log; the Phase 2
      # release checklist requires reviewing this output before tagging.
      - name: Run govulncheck (informational)
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  backend-lint:
    name: Go lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.25'
          cache: true

      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.6

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: npm audit (production deps)
        run: npm audit --omit=dev --audit-level=high
        working-directory: web

      - name: Lint
        run: npm run lint
        working-directory: web

      - name: Format check
        run: npm run format:check
        working-directory: web

      - name: Unit tests
        run: npm test
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web

      - name: Bundle size budget
        run: npm run check:bundle-size
        working-directory: web
