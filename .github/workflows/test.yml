name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # S20 — guard the three places we bump on every release. The release
  # checklist in CLAUDE.md / SECURITY.md requires VERSION, web/package.json,
  # and web/package-lock.json to move together. CI failing here catches a
  # half-bumped commit before the publish-image workflow tags an image
  # whose binary advertises one version and whose frontend reports another.
  version-sync:
    name: Release-file version sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Compare VERSION, web/package.json, web/package-lock.json
        run: |
          set -euo pipefail
          v_file=$(tr -d '\n\r ' < VERSION)
          v_pkg=$(node -p "require('./web/package.json').version")
          v_lock=$(node -p "require('./web/package-lock.json').version")
          echo "VERSION=$v_file"
          echo "package.json=$v_pkg"
          echo "package-lock.json=$v_lock"
          if [ "$v_file" != "$v_pkg" ] || [ "$v_file" != "$v_lock" ]; then
            echo "::error::version drift — VERSION/package.json/package-lock.json must all match"
            exit 1
          fi

  backend:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26'
          cache: true

      - name: go vet
        run: go vet ./...

      # -coverpkg=./... counts cross-package coverage so the M7
      # services-split tests in internal/services/*_test.go register
      # against the sub-packages they exercise (jobs/, credentials/,
      # backup/, etc.) instead of leaving each sub-package at 0%
      # package-local coverage. Without this flag the same code looks
      # ~12 points less covered than it actually is.
      #
      # -race because AppService guards shared state with several
      # mutexes (mu, authMu, jobSpawnMu) plus a WaitGroup — lock-
      # discipline regressions are invisible to plain tests but show
      # up here. -covermode=atomic is already the -race-compatible mode.
      - name: Run tests with coverage
        run: go test ./... -race -coverpkg=./... -coverprofile=coverage.out -covermode=atomic

      # M3 — drift check between `internal/models.*` and the canonical
      # snapshot in `internal/models/schema.gen.json`. A new field on a
      # struct that the SPA serialises has to be regenerated with
      # `go run ./cmd/modelschema` and committed alongside the matching
      # `web/src/lib/types.ts` update. Non-zero exit on drift.
      - name: Model schema drift check
        run: go run ./cmd/modelschema --check

      # S15 — coverage gate. Baseline at the v0.2.10 cut was 41.6%
      # measured with the default package-local coverage; v0.3.0
      # switched to -coverpkg=./... (see Run tests step) which gives
      # a more honest cross-package count and durably reads ~50%.
      # 45% gate guards against regression. Bump this floor when the
      # measured number durably exceeds it. Note: models/, util/,
      # and cmd/ have no tests by design (data structs / entry).
      - name: Coverage gate (>=45%)
        run: |
          set -euo pipefail
          go tool cover -func=coverage.out | grep total: | awk '{print $3}' > coverage.txt
          pct=$(sed 's/%//' coverage.txt)
          echo "coverage: ${pct}%"
          ok=$(awk -v p="$pct" 'BEGIN{print (p >= 45.0) ? 1 : 0}')
          if [ "$ok" -ne 1 ]; then
            echo "::error::coverage ${pct}% < 45% floor"
            exit 1
          fi

  govulncheck:
    name: Go vulnerability check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26'
          cache: true

      # govulncheck is informational while Go releases catch up on stdlib
      # CVEs — a fresh `net`/`net/http` advisory will flag any deployment
      # still on the previous patch release, but blocking CI on it would
      # turn every Go security release into an unrelated test failure
      # for every PR until setup-go's "1.25" alias points to the new
      # patch. The output is still surfaced in the job log; the Phase 2
      # release checklist requires reviewing this output before tagging.
      - name: Run govulncheck (informational)
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  backend-lint:
    name: Go lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26'
          cache: true

      # golangci-lint must be built with a Go >= the toolchain it analyzes;
      # v2.6 (built with Go 1.25) panics on the Go 1.26 stdlib with
      # "file requires newer Go version go1.26". v2.12 is built with 1.26.
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.12

  # Smoke-build the production image on every PR + push. None of the
  # other jobs touch docker/Dockerfile, so a breaking base-image bump
  # (e.g. the node 20→26-alpine / golang 1.25→1.26-alpine bump in v0.3.4)
  # would otherwise sail through all required checks and only surface
  # 17-22 min into publish-image.yml at release time. Single-platform
  # (linux/amd64, native runner — no QEMU) is enough to catch a broken
  # Dockerfile; no push. A dedicated gha cache scope keeps this off the
  # multi-arch cache that publish-image.yml builds against.
  image-build:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Read VERSION
        id: ver
        run: echo "version=$(tr -d '\n\r ' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Build image (amd64, no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: false
          cache-from: type=gha,scope=ci-image-smoke
          cache-to: type=gha,mode=max,scope=ci-image-smoke
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
            VCS_REF=${{ github.sha }}

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '26'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: npm audit (production deps)
        run: npm audit --omit=dev --audit-level=high
        working-directory: web

      - name: Lint
        run: npm run lint
        working-directory: web

      - name: Format check
        run: npm run format:check
        working-directory: web

      # Coverage thresholds live in web/vitest.config.ts (30% statements/
      # lines vs a ~36%/38% baseline at introduction) — the frontend
      # counterpart of the backend's 45% gate. vitest exits non-zero when
      # the floor is undercut.
      - name: Unit tests (with coverage gate)
        run: npm run test:coverage
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web

      - name: Bundle size budget
        run: npm run check:bundle-size
        working-directory: web

  # Playwright E2E (roadmap T8). Builds the SPA, embeds it into the Go
  # binary, boots it, and drives a real browser through the login + nav
  # flows. Deliberately NOT a required status check on main: keeping it off
  # the required list means an occasional E2E flake never blocks a merge,
  # while still surfacing real regressions in the PR's check list.
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26'
          cache: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '26'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: web

      - name: Build SPA + embed into the binary
        run: |
          npm --prefix web run build
          make frontend-sync

      - name: Run E2E against the built binary
        run: |
          set -euo pipefail
          make dev-backend > /tmp/e2e-server.log 2>&1 &
          for i in $(seq 1 60); do
            curl -fsS --max-time 2 http://127.0.0.1:8080/health >/dev/null 2>&1 && break
            sleep 1
          done
          curl -fsS http://127.0.0.1:8080/health
          cd web && PLAYWRIGHT_BASE_URL=http://localhost:8080 npx playwright test
