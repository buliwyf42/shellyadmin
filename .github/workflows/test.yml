name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...

  backend-lint:
    name: Go lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: true

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Lint
        run: npm run lint
        working-directory: web

      - name: Format check
        run: npm run format:check
        working-directory: web

      - name: Unit tests
        run: npm test
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web

      - name: Bundle size budget
        run: npm run check:bundle-size
        working-directory: web
