name: Bug report
description: Report a reproducible problem in ShellyAdmin
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please keep security-sensitive details out of public issues and use the repository security policy instead.
  - type: input
    id: version
    attributes:
      label: Version
      description: App version, container tag, or commit if known
      placeholder: v0.0.4
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Describe LAN setup, Docker mode, reverse proxy, and anything else relevant
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
